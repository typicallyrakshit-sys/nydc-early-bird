<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Registration — NYDC 2026</title>
    <meta name="description" content="Register your team for the National Youth Development Conference 2026">
    <link rel="stylesheet" href="../css/registration.css">
    <link rel="stylesheet" href="../css/selection.css">
    <link rel="icon" href="../../NYDC-Final-main/images/nydc-logo.png" type="image/png" />
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

    <!-- Background Ambience -->
    <div class="bg-ambience"></div>

    <!-- Decorative Frame -->
    <div class="border-frame"></div>

    <!-- Grainy Side Borders -->
    <div class="grainy-border-left"></div>
    <div class="grainy-border-right"></div>

    <!-- Top Banner -->
    <div class="top-banner">
        <p>NYDC 2026 POWERED BY GENSPARK</p>
    </div>

    <!-- Team Registration -->
    <main class="registration-wrapper">
        <div class="registration-card team-card">

            <!-- Back Link -->
            <a href="#" class="back-link" id="team-back-link">← Back</a>

            <!-- Header -->
            <div class="card-header">
                <span class="card-tag" id="event-tag"><!-- filled by JS --></span>
                <h1>Build Your <span>Team</span></h1>
                <p class="card-subtitle greeting" id="team-info">
                    <!-- filled by JS -->
                </p>
            </div>

            <div class="divider"></div>

            <!-- Team Members Container -->
            <form id="team-form">

                <!-- IPL Team Selection (Conditional) -->
                <div id="ipl-team-section" style="display: none;">
                    <span class="events-label">Represent Your Franchise</span>
                    <div class="ipl-grid">
                        <!-- Mumbai Indians -->
                        <div class="ipl-team-card" style="--team-color: #004BA0;">
                            <input type="radio" name="ipl_team" id="ipl-mi" value="Mumbai Indians">
                            <label for="ipl-mi">
                                <span class="team-abbr">MI</span>
                                <span class="team-name">Mumbai Indians</span>
                            </label>
                        </div>
                        <!-- Chennai Super Kings -->
                        <div class="ipl-team-card" style="--team-color: #F9CD05;">
                            <input type="radio" name="ipl_team" id="ipl-csk" value="Chennai Super Kings">
                            <label for="ipl-csk">
                                <span class="team-abbr">CSK</span>
                                <span class="team-name">Chennai Super Kings</span>
                            </label>
                        </div>
                        <!-- RCB -->
                        <div class="ipl-team-card" style="--team-color: #EC1C24;">
                            <input type="radio" name="ipl_team" id="ipl-rcb" value="Royal Challengers Bangalore">
                            <label for="ipl-rcb">
                                <span class="team-abbr">RCB</span>
                                <span class="team-name">Royal Challengers Bangalore</span>
                            </label>
                        </div>
                        <!-- KKR -->
                        <div class="ipl-team-card" style="--team-color: #3A225D;">
                            <input type="radio" name="ipl_team" id="ipl-kkr" value="Kolkata Knight Riders">
                            <label for="ipl-kkr">
                                <span class="team-abbr">KKR</span>
                                <span class="team-name">Kolkata Knight Riders</span>
                            </label>
                        </div>
                        <!-- DC -->
                        <div class="ipl-team-card" style="--team-color: #17479E;">
                            <input type="radio" name="ipl_team" id="ipl-dc" value="Delhi Capitals">
                            <label for="ipl-dc">
                                <span class="team-abbr">DC</span>
                                <span class="team-name">Delhi Capitals</span>
                            </label>
                        </div>
                        <!-- RR -->
                        <div class="ipl-team-card" style="--team-color: #EA1A85;">
                            <input type="radio" name="ipl_team" id="ipl-rr" value="Rajasthan Royals">
                            <label for="ipl-rr">
                                <span class="team-abbr">RR</span>
                                <span class="team-name">Rajasthan Royals</span>
                            </label>
                        </div>
                        <!-- PK -->
                        <div class="ipl-team-card" style="--team-color: #ED1B24;">
                            <input type="radio" name="ipl_team" id="ipl-pk" value="Punjab Kings">
                            <label for="ipl-pk">
                                <span class="team-abbr">PBKS</span>
                                <span class="team-name">Punjab Kings</span>
                            </label>
                        </div>
                        <!-- SRH -->
                        <div class="ipl-team-card" style="--team-color: #FF822A;">
                            <input type="radio" name="ipl_team" id="ipl-srh" value="Sunrisers Hyderabad">
                            <label for="ipl-srh">
                                <span class="team-abbr">SRH</span>
                                <span class="team-name">Sunrisers Hyderabad</span>
                            </label>
                        </div>
                        <!-- GT -->
                        <div class="ipl-team-card" style="--team-color: #1C1C2B;">
                            <input type="radio" name="ipl_team" id="ipl-gt" value="Gujarat Titans">
                            <label for="ipl-gt">
                                <span class="team-abbr">GT</span>
                                <span class="team-name">Gujarat Titans</span>
                            </label>
                        </div>
                        <!-- LSG -->
                        <div class="ipl-team-card" style="--team-color: #A72056;">
                            <input type="radio" name="ipl_team" id="ipl-lsg" value="Lucknow Super Giants">
                            <label for="ipl-lsg">
                                <span class="team-abbr">LSG</span>
                                <span class="team-name">Lucknow Super Giants</span>
                            </label>
                        </div>
                    </div>
                    <div class="divider" style="margin: 24px 0;"></div>
                </div>

                <!-- Member cards injected here -->
                <div id="members-container"></div>

                <!-- Add Member Button -->
                <button type="button" class="add-member-btn" id="add-member-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Team Member
                </button>

                <!-- Payment Section -->
                <div class="payment-section" id="payment-section">
                    <div class="divider" style="margin: 28px 0;"></div>
                    <span class="events-label">💳 Payment</span>
                    
                    <div class="payment-info-box">
                        <div class="payment-price-row">
                            <span>Amount to Pay</span>
                            <span class="payment-amount" id="payment-amount">—</span>
                        </div>
                        <div class="payment-coupon-row" id="payment-coupon-row" style="display:none;">
                            <span>Coupon Applied</span>
                            <span class="payment-coupon-badge" id="payment-coupon-badge"></span>
                        </div>
                    </div>

                    <a href="#" id="upi-pay-link" class="upi-pay-btn" target="_blank">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                            <line x1="1" y1="10" x2="23" y2="10"></line>
                        </svg>
                        Pay via UPI
                    </a>
                    <p class="payment-hint">Click above to pay, then enter your UPI Transaction ID below</p>

                    <!-- Transaction ID Input -->
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="transaction-id">UPI Transaction ID / Reference Number</label>
                        <input type="text" id="transaction-id" name="transaction_id" placeholder="e.g. 512345678901" required autocomplete="off" spellcheck="false" style="letter-spacing:0.1em;">
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="submit-btn">Register Now</button>
            </form>

            <p class="form-footer">
                By registering, you agree to our <a href="privacy_policy.html">Privacy Policy</a> and <a href="refund_policy.html">Refund Policy</a>. 
            </p>

            <!-- Step Indicator -->
            <p class="step-indicator">Step 3 of 3 — Team Details</p>
        </div>
    </main>

    <!-- Team Logic -->
    <script>
      // ─── Event → Max team size mapping ───
      const TEAM_LIMITS = {
        film_making:   5,
        moot_court:    4,
        spark_tank:    4,
        raag_jaam:     6,
        hackathon:     4,
        debate:        2,
        ipl:           4
        // everything else defaults to 1
      };

      const EVENT_NAMES = {
        mun: 'Model United Nations',
        moot_court: 'Moot Court',
        hackathon: 'Hackathon',
        debate: 'Conventional Debate',
        spark_tank: 'Spark Tank',
        marketing: 'Marketing',
        paper_trading: 'Paper Trading',
        film_making: 'Film Making',
        Navras: 'Navras',
        poetry: 'Poetry',
        raag_jaam: 'Raag Jaam',
        ipl: 'IPL'
      };

      // ─── Guard: must have personal data + event ───
      const storedPersonal = sessionStorage.getItem('nydc_registration');
      const storedEvent    = sessionStorage.getItem('nydc_event');

      if (!storedPersonal || !storedEvent) {
        window.location.href = !storedPersonal ? '../registration.html' : 'event.html';
      }

      const personal  = JSON.parse(storedPersonal);
      const eventData = JSON.parse(storedEvent);
      const eventKey  = eventData.event;
      const maxMembers = TEAM_LIMITS[eventKey] || 1;
      const eventName  = EVENT_NAMES[eventKey] || eventKey;

      // ─── Set dynamic back link ───
      const backLink = document.getElementById('team-back-link');
      if (eventKey === 'mun') {
        backLink.href = 'mun.html';
        backLink.innerHTML = '← Back to Committees';
      } else {
        backLink.href = 'event.html';
        backLink.innerHTML = '← Back to Events';
      }

      // ─── Fill header info ───
      document.getElementById('event-tag').textContent = eventName;
      const isSolo = maxMembers === 1;
      document.getElementById('team-info').innerHTML = isSolo
        ? 'This is a <strong>solo event</strong> — confirm your details below'
        : 'You can add up to <strong>' + maxMembers + ' members</strong> to your team';

      // ─── IPL Team Section Toggle ───
      const iplSection = document.getElementById('ipl-team-section');
      if (eventKey === 'ipl') {
        iplSection.style.display = 'block';
        // Add required validation only when IPL section is visible
        document.getElementById('ipl-mi').setAttribute('required', '');
      }

      // ─── Member card template ───
      let memberCount = 0;

      function createMemberCard(index, prefill) {
        const num = index + 1;
        const isLeader = index === 0;
        const card = document.createElement('div');
        card.className = 'member-card';
        card.setAttribute('data-index', index);
        card.innerHTML = `
          <div class="member-card-header">
            <span class="member-number">${isLeader ? '👑 Team Leader' : 'Member ' + num}</span>
            ${!isLeader ? '<button type="button" class="remove-member-btn" title="Remove member">✕</button>' : ''}
          </div>
          <div class="member-fields">
            <div class="form-row">
              <div class="form-group">
                <label>First Name</label>
                <input type="text" name="member_first_${index}" placeholder="First name" value="${prefill ? prefill.firstName : ''}" required ${isLeader ? 'readonly' : ''}>
              </div>
              <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="member_last_${index}" placeholder="Last name" value="${prefill ? prefill.lastName : ''}" required ${isLeader ? 'readonly' : ''}>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Email</label>
                <input type="email" name="member_email_${index}" placeholder="Email address" value="${prefill ? prefill.email : ''}" required ${isLeader ? 'readonly' : ''}>
              </div>
              <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="member_phone_${index}" placeholder="Phone number" value="${prefill ? prefill.phone : ''}" required ${isLeader ? 'readonly' : ''}>
              </div>
            </div>
            <div class="form-group">
              <label>School / Institution</label>
              <input type="text" name="member_school_${index}" placeholder="School name" value="${prefill ? prefill.school : ''}" required ${isLeader ? 'readonly' : ''}>
            </div>
          </div>
        `;

        // Remove button handler
        const removeBtn = card.querySelector('.remove-member-btn');
        if (removeBtn) {
          removeBtn.addEventListener('click', () => {
            card.classList.add('removing');
            setTimeout(() => {
              card.remove();
              memberCount--;
              updateAddButton();
              renumberCards();
            }, 300);
          });
        }

        return card;
      }

      function renumberCards() {
        const cards = document.querySelectorAll('.member-card');
        cards.forEach((card, i) => {
          const label = card.querySelector('.member-number');
          if (i === 0) {
            label.textContent = '👑 Team Leader';
          } else {
            label.textContent = 'Member ' + (i + 1);
          }
        });
      }

      function updateAddButton() {
        const btn = document.getElementById('add-member-btn');
        if (memberCount >= maxMembers) {
          btn.style.display = 'none';
        } else {
          btn.style.display = 'flex';
        }
      }

      // ─── Initialize: first card is the registrant ───
      const container = document.getElementById('members-container');
      container.appendChild(createMemberCard(0, personal));
      memberCount = 1;

      // Hide add button for solo events
      updateAddButton();

      // ─── Add member ───
      document.getElementById('add-member-btn').addEventListener('click', () => {
        if (memberCount >= maxMembers) return;
        const card = createMemberCard(memberCount, null);
        container.appendChild(card);
        memberCount++;
        updateAddButton();
        // Scroll to new card
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        // Focus first input
        setTimeout(() => card.querySelector('input').focus(), 400);
      });
    </script>

    <!-- Payment Logic -->
    <script>
      // ─── Price data from event selection ───
      const PRICES = {
        mun:           { original: 1699, increased: 1869 },
        moot_court:    { original: 3499, increased: 3849 },
        debate:        { original: 1599, increased: 1759 },
        spark_tank:    { original: 3199, increased: 3519 },
        marketing:     { original: 999,  increased: 1099 },
        paper_trading: { original: 1199, increased: 1319 },
        film_making:   { original: 2999, increased: 3299 },
        Navras:        { original: 1499, increased: 1649 },
        poetry:        { original: 999,  increased: 1099 },
        raag_jaam:     { original: 3999, increased: 4399 },
        ipl:           { original: 2999, increased: 3299 }
      };

      // ─── Set up payment section ───
      const paymentPrice = eventData.price || (PRICES[eventKey] ? (eventData.couponApplied ? PRICES[eventKey].original : PRICES[eventKey].increased) : 0);
      const UPI_ID = 'gupta-damini@ptyes';

      // Display price
      document.getElementById('payment-amount').textContent = '₹' + paymentPrice.toLocaleString('en-IN');

      // Show coupon info if applied
      if (eventData.couponApplied && eventData.couponCode) {
        document.getElementById('payment-coupon-row').style.display = 'flex';
        document.getElementById('payment-coupon-badge').textContent = eventData.couponCode;
      }

      // UPI deep link
      const upiLink = `upi://pay?pa=${UPI_ID}&am=${paymentPrice}&cu=INR`;
      document.getElementById('upi-pay-link').href = upiLink;

      // ─── Transaction ID ───
      window.__paymentPrice = paymentPrice;
    </script>

    <!-- Firebase Integration (Inline for reliability) -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js';
      import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js';
      import { getAuth } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js';

      const firebaseConfig = {
        apiKey: "AIzaSyDBo7RP1PSFhva-Ni0pKScX0MlIuUEAmnE",
        authDomain: "nydc-72b34.firebaseapp.com",
        projectId: "nydc-72b34",
        storageBucket: "nydc-72b34.firebasestorage.app",
        messagingSenderId: "935882112599",
        appId: "1:935882112599:web:f04b660e233f21a46f2d12",
        measurementId: "G-5G8Z44578K"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      if (typeof emailjs !== 'undefined') {
        emailjs.init({ publicKey: 'Vvw-ypTsbb2QHoiiX' });
      }

      const form = document.getElementById('team-form');
      if (!form) { console.error('team-form not found'); }

      const submitBtn = form.querySelector('.submit-btn');

      const storedPersonal = sessionStorage.getItem('nydc_registration');
      const storedEvent    = sessionStorage.getItem('nydc_event');
      const storedMun      = sessionStorage.getItem('nydc_mun_selection');
      const storedCoupon   = sessionStorage.getItem('nydc_coupon');

      if (!storedPersonal || !storedEvent) {
        window.location.href = '../registration.html';
      }

      const personalData  = storedPersonal ? JSON.parse(storedPersonal) : {};
      const evData        = storedEvent ? JSON.parse(storedEvent) : {};
      const munPortfolios = storedMun ? JSON.parse(storedMun) : null;
      const couponInfo    = storedCoupon ? JSON.parse(storedCoupon) : null;

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        console.log('Form submit intercepted');

        // Validate transaction ID
        const txnInput = document.getElementById('transaction-id');
        const transactionId = txnInput ? txnInput.value.trim() : '';
        if (!transactionId) {
          alert('Please enter your UPI Transaction ID before submitting.');
          if (txnInput) txnInput.focus();
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting…';

        // Gather team members
        const memberCards = document.querySelectorAll('.member-card');
        const teamMembers = [];
        memberCards.forEach((card, i) => {
          const idx = card.dataset.index;
          teamMembers.push({
            firstName: (card.querySelector(`input[name="member_first_${idx}"]`) || {}).value?.trim() || '',
            lastName:  (card.querySelector(`input[name="member_last_${idx}"]`) || {}).value?.trim() || '',
            email:     (card.querySelector(`input[name="member_email_${idx}"]`) || {}).value?.trim() || '',
            phone:     (card.querySelector(`input[name="member_phone_${idx}"]`) || {}).value?.trim() || '',
            school:    (card.querySelector(`input[name="member_school_${idx}"]`) || {}).value?.trim() || '',
            role:      i === 0 ? 'leader' : 'member'
          });
        });

        // IPL Team
        let iplTeam = null;
        if (evData.event === 'ipl') {
          const sel = form.querySelector('input[name="ipl_team"]:checked');
          iplTeam = sel ? sel.value : null;
        }

        try {
          const registrationData = {
            uid:           personalData.uid || null,
            firstName:     personalData.firstName,
            lastName:      personalData.lastName,
            email:         personalData.email,
            phone:         personalData.phone,
            school:        personalData.school,
            grade:         personalData.grade,
            city:          personalData.city,
            event:         evData.event,
            experience:    evData.experience,
            munPortfolios: munPortfolios,
            iplTeam:       iplTeam,
            price:         evData.price || window.__paymentPrice || null,
            couponApplied: couponInfo ? couponInfo.applied : false,
            couponCode:    couponInfo ? couponInfo.code : null,
            transactionId: transactionId,
            status:        'pending',
            teamSize:      teamMembers.length,
            teamMembers:   teamMembers,
            registeredAt:  serverTimestamp()
          };

          const docRef = await addDoc(collection(db, 'registrations'), registrationData);
          console.log('Registration saved:', docRef.id);

          // EmailJS removed: Emails will only be sent upon Admin approval/rejection.

          // Clear session
          sessionStorage.removeItem('nydc_registration');
          sessionStorage.removeItem('nydc_event');
          sessionStorage.removeItem('nydc_mun_selection');
          sessionStorage.removeItem('nydc_coupon');

          // Show pending message
          const card = document.querySelector('.registration-card');
          card.innerHTML = `
            <div style="text-align:center; padding:40px 0;">
              <div style="width:60px;height:60px;border-radius:50%;background:rgba(234,179,8,0.2);border:2px solid #eab308;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="8" x2="12" y2="12"></line>
                  <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
              </div>
              <h2 style="font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;margin-bottom:12px;">
                Registration <span style="color:#eab308;">Pending</span>
              </h2>
              <p style="font-family:'Outfit',sans-serif;color:#9ca3af;font-size:0.9rem;line-height:1.6;">
                Thank you, <strong style="color:#fff;">${registrationData.firstName}</strong>! Your registration is <strong style="color:#eab308;">pending approval</strong>.<br>
                Transaction ID: <strong style="color:#fff;">${transactionId}</strong><br>
                We'll verify your payment and send a confirmation email once approved.
              </p>
              <p style="font-family:'Outfit',sans-serif;color:#6b7280;font-size:0.75rem;margin-top:16px;letter-spacing:0.1em;text-transform:uppercase;">
                Registration ID: ${docRef.id}
              </p>
              <p style="font-family:'Outfit',sans-serif;color:#6b7280;font-size:0.75rem;margin-top:20px;">
                Redirecting to your profile…
              </p>
            </div>
          `;

          setTimeout(() => { window.location.href = 'profile.html'; }, 3000);

        } catch (error) {
          console.error('Registration error:', error);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Register Now';
          alert('Registration failed!\n\nError: ' + error.message + '\n\nPlease check your connection and try again.');
        }
      });

      console.log('✅ Form submit handler attached successfully');
    </script>

</body>
</html>
