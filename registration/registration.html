<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — NYDC 2026</title>
    <meta name="description" content="Register for the National Youth Development Conference 2026">
    <link rel="stylesheet" href="css/registration.css">
    <link rel="icon" href="../NYDC-Final-main/images/nydc-logo.png" type="image/png" />
</head>
<body>

    <!-- Background Ambience -->
    <div class="bg-ambience"></div>

    <!-- Decorative Frame -->
    <div class="border-frame"></div>

    <!-- Grainy Side Borders -->
    <div class="grainy-border-left"></div>
    <div class="grainy-border-right"></div>

    <!-- Top Banner -->
    <div class="top-banner">
        <p>NYDC 2026 POWERED BY GENSPARK</p>
    </div>

    <!-- Registration Form -->
    <main class="registration-wrapper">
        <div class="registration-card">

            <!-- Back Link -->
            <a href="../index.html" class="back-link">🏠 Main Page</a>

            <!-- Header -->
            <div class="card-header">
                <span class="card-tag">July 2026 • Delhi NCR</span>
                <h1>Register for <span>NYDC</span></h1>
                <p class="card-subtitle">
                    <span class="pulse-dot"></span>
                    &nbsp; Registrations Open
                </p>
            </div>

            <div class="divider"></div>

            <!-- Form -->
            <form id="registration-form" action="#" method="POST">

                <!-- Name Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" name="first_name" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" name="last_name" placeholder="Doe" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <!-- Password -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6">
                            <button type="button" class="password-toggle" data-target="password" aria-label="Toggle password visibility">
                                <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                        <div class="password-strength" id="password-strength">
                            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                            <span class="strength-text" id="strength-text"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirm-password" name="confirm_password" placeholder="Re-enter password" required minlength="6">
                            <button type="button" class="password-toggle" data-target="confirm-password" aria-label="Toggle password visibility">
                                <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                        <p class="password-error" id="password-error"></p>
                    </div>
                </div>

                <!-- Phone & School -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required>
                    </div>
                    <div class="form-group">
                        <label for="school">School / Institution</label>
                        <input type="text" id="school" name="school" placeholder="Your school name" required>
                    </div>
                </div>

                <!-- Grade & City -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="grade">Grade / Year</label>
                        <select id="grade" name="grade" required>
                            <option value="" disabled selected>Select grade</option>
                            <option value="8">Grade 8</option>
                            <option value="9">Grade 9</option>
                            <option value="10">Grade 10</option>
                            <option value="11">Grade 11</option>
                            <option value="12">Grade 12</option>
                            <option value="college">College</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="New Delhi" required>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="submit-btn">Continue to Events →</button>
            </form>

            <!-- Step Indicator -->
            <p class="step-indicator">Step 1 of 3 — Personal Details</p>
        </div>
    </main>

    <!-- Firebase Auth + Save to sessionStorage & redirect -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js';
      import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js';

      const firebaseConfig = {
        apiKey: "AIzaSyDBo7RP1PSFhva-Ni0pKScX0MlIuUEAmnE",
        authDomain: "nydc-72b34.firebaseapp.com",
        projectId: "nydc-72b34",
        storageBucket: "nydc-72b34.firebasestorage.app",
        messagingSenderId: "935882112599",
        appId: "1:935882112599:web:f04b660e233f21a46f2d12",
        measurementId: "G-5G8Z44578K"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // ── Password toggle ──
      document.querySelectorAll('.password-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.getElementById(btn.dataset.target);
          const isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          btn.querySelector('.eye-icon').style.display = isPassword ? 'none' : 'block';
          btn.querySelector('.eye-off-icon').style.display = isPassword ? 'block' : 'none';
        });
      });

      // ── Password strength indicator ──
      const passwordInput = document.getElementById('password');
      const strengthFill = document.getElementById('strength-fill');
      const strengthText = document.getElementById('strength-text');

      passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = [
          { width: '0%', color: 'transparent', label: '' },
          { width: '20%', color: '#ef4444', label: 'Weak' },
          { width: '40%', color: '#f97316', label: 'Fair' },
          { width: '60%', color: '#eab308', label: 'Good' },
          { width: '80%', color: '#22c55e', label: 'Strong' },
          { width: '100%', color: '#16a34a', label: 'Very Strong' }
        ];
        const level = levels[score];
        strengthFill.style.width = level.width;
        strengthFill.style.background = level.color;
        strengthText.textContent = level.label;
        strengthText.style.color = level.color;
      });

      // ── Form submission ──
      const form = document.getElementById('registration-form');
      const submitBtn = form.querySelector('.submit-btn');
      const passwordError = document.getElementById('password-error');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        passwordError.textContent = '';

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (password !== confirmPassword) {
          passwordError.textContent = 'Passwords do not match';
          document.getElementById('confirm-password').classList.add('input-error');
          return;
        }
        document.getElementById('confirm-password').classList.remove('input-error');

        const email = document.getElementById('email').value.trim();

        // Disable button
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating Account…';

        try {
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          const uid = userCredential.user.uid;

          const data = {
            uid,
            firstName: document.getElementById('first-name').value.trim(),
            lastName:  document.getElementById('last-name').value.trim(),
            email,
            phone:     document.getElementById('phone').value.trim(),
            school:    document.getElementById('school').value.trim(),
            grade:     document.getElementById('grade').value,
            city:      document.getElementById('city').value.trim()
          };
          sessionStorage.setItem('nydc_registration', JSON.stringify(data));
          window.location.href = 'html/event.html';
        } catch (error) {
          console.error("Firebase Auth Error:", error);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Continue to Events →';
          let msg = 'Something went wrong: ' + error.message;
          if (error.code === 'auth/email-already-in-use') msg = 'This email is already registered. Try logging in instead.';
          else if (error.code === 'auth/weak-password') msg = 'Password is too weak. Use at least 6 characters.';
          else if (error.code === 'auth/invalid-email') msg = 'Please enter a valid email address.';
          passwordError.textContent = msg;
        }
      });
    </script>

</body>
</html>
